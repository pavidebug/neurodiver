<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="NeuroDiver — a calming check-in and productivity companion designed for neurodivergent minds."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>NeuroDiver</title>
    <script>
      try {
        const theme = localStorage.getItem('neurodiver-theme')
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
        const useDark = theme === 'dark' || (theme !== 'light' && prefersDark)
        if (useDark) document.documentElement.classList.add('dark')
      } catch (_) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
